<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武林通缉令：偷心盗贼</title>
    <style>
        body {
            background-color: #2c1e16; /* 深色背景烘托氛围 */
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "STKaiti", serif;
            color: #4a3428;
        }

        /* 通缉令主容器 */
        .poster {
            background: #e6c794; /* 仿旧纸张颜色 */
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(139, 69, 19, 0.2);
            border: 12px double #5d4037;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            transform: rotate(-1deg); /* 稍微倾斜增加真实感 */
        }

        h1 {
            font-size: 3rem;
            margin: 10px 0;
            letter-spacing: 15px;
            border-bottom: 4px solid #4a3428;
            padding-bottom: 10px;
            font-weight: 900;
        }

        .image-container {
            border: 5px solid #4a3428;
            margin: 20px 0;
            line-height: 0;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: auto;
            filter: sepia(0.3) contrast(1.1); /* 稍微调色匹配复古风 */
        }

        .content {
            text-align: left;
            padding: 0 10px;
        }

        .crime-title {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            color: #8b0000; /* 暗红色突出危险性 */
        }

        .details {
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .bounty {
            margin-top: 25px;
            font-size: 1.8rem;
            color: #8b0000;
            font-weight: bold;
            border: 2px dashed #8b0000;
            padding: 10px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }

        .stamp {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border: 3px solid #b22222;
            border-radius: 50%;
            color: #b22222;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transform: rotate(20deg);
            opacity: 0.7;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="poster">
        <h1>通緝</h1>
        
        <div class="image-container">
            <img src="./2.png" alt="偷心盗贼肖像">
        </div>

        <div class="content">
            <div class="crime-title">【 江湖绰号：偷心盗贼 】</div>
            <div class="details">
                <strong>● 姓名：</strong> 不详（疑为芳心纵火犯）<br>
                <strong>● 特征：</strong> 常佩戴黑色秘银框架眼镜，头顶银色流光护盔，擅使“V字剪刀手”幻术，见者多半会心跳加速。<br>
                <strong>● 罪状：</strong> 该犯近期流窜于大街小巷，凭借其杀伤力极强的眼神与儒雅随和的外表，非法窃取良家少男少女“心动值”若干，性质恶劣。<br>
                <strong>● 出没地：</strong> 繁华街头、你梦里。
            </div>
        </div>

        <div class="bounty">
            赏金：一生一世
        </div>

        <div class="stamp">
            六扇门<br>特批
        </div>
    </div>

</body>
</html>
